name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # nightly rebuild to pick up data updates
  repository_dispatch:
    types: [cdd-data-released]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Data is committed until TODO.astro/04 ships the cdd-data Release
      # pipeline. When that lands, replace this with a fetch step:
      #   env:
      #     CDD_DATA_RELEASE: latest
      #     GH_TOKEN: ${{ secrets.CDD_DATA_READ_TOKEN }}
      #   run: npm run fetch-data
      # `CDD_DATA_READ_TOKEN` will need to be a PAT with read access to
      # opencdd/cdd-data (private repo).

      - name: Generate per-dictionary tree JSON
        run: npm run gen-tree

      - name: Type check
        run: npm run check

      - name: Test
        run: npm test

      - name: Build (includes Pagefind indexing)
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # nightly rebuild to pick up data updates
  repository_dispatch:
    types: [cdd-data-released]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Clone the private cdd-data repo to get the latest data snapshot.
      # Uses OPENCDD_CI_PAT_TOKEN for cross-repo access.
      - name: Fetch latest data from cdd-data
        uses: actions/checkout@v4
        with:
          repository: opencdd/cdd-data
          path: cdd-data-src
          token: ${{ secrets.OPENCDD_CI_PAT_TOKEN }}

      - name: Copy data into browser
        run: |
          mkdir -p src/content/data
          cp -r cdd-data-src/data/* src/content/data/
          echo "=== Data copied ==="
          ls src/content/data/
          rm -rf cdd-data-src

      - name: Generate per-dictionary tree JSON
        run: npm run gen-tree

      - name: Type check
        run: npm run check

      - name: Test
        run: npm test

      - name: Build (includes Pagefind indexing)
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

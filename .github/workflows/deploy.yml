name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # nightly rebuild to pick up data updates
  repository_dispatch:
    types: [cdd-data-released]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Fetch latest data from the private cdd-data GitHub Release.
      # Downloads the release zip directly via curl with the PAT,
      # extracts into src/content/data/. Bypasses gh CLI (which has
      # auth issues in some Actions environments).
      - name: Fetch latest data
        env:
          CDD_PAT: ${{ secrets.OPENCDD_CI_PAT_TOKEN }}
        run: |
          curl -sL --fail \
            -H "Authorization: Bearer ${CDD_PAT}" \
            -H "Accept: application/octet-stream" \
            -o /tmp/cdd-data.zip \
            "https://api.github.com/repos/opencdd/cdd-data/releases/assets/$(curl -sL -H "Authorization: Bearer ${CDD_PAT}" https://api.github.com/repos/opencdd/cdd-data/releases/latest | python3 -c "import sys,json; assets=json.load(sys.stdin)['assets']; print(assets[0]['id'] if assets else '')")"
          mkdir -p src/content/data
          unzip -o /tmp/cdd-data.zip -d src/content/data/
          echo "=== Data extracted ==="
          ls src/content/data/

      - name: Generate per-dictionary tree JSON
        run: npm run gen-tree

      - name: Type check
        run: npm run check

      - name: Test
        run: npm test

      - name: Build (includes Pagefind indexing)
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
